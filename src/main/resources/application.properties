spring.application.name=banquito-switch-on-us-settlement-service
server.port=${SERVER_PORT:8083}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/SWITCH_LIQUIDACION_ON_US_DB}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init/001_create_on_us_settlement_tables.sql

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

rabbit.exchange.routing=${RABBIT_EXCHANGE_ROUTING:switch.routing.exchange}
rabbit.exchange.settlement=${RABBIT_EXCHANGE_SETTLEMENT:switch.settlement.exchange}
rabbit.queue.settlement.on-us=${RABBIT_QUEUE_SETTLEMENT_ON_US:switch.settlement.on-us.queue}
rabbit.queue.settlement.completed=${RABBIT_QUEUE_SETTLEMENT_COMPLETED:switch.settlement.completed.queue}
rabbit.routing-key.routed-on-us=${RABBIT_ROUTING_KEY_ROUTED_ON_US:payment.line.routed.on-us}
rabbit.routing-key.on-us-completed=${RABBIT_ROUTING_KEY_ON_US_COMPLETED:payment.line.on-us.completed}
rabbit.routing-key.line-rejected=${RABBIT_ROUTING_KEY_LINE_REJECTED:payment.line.rejected}

core.kong.base-url=${CORE_KONG_BASE_URL:http://localhost:8000}
core.kong.switch-core-path=${CORE_KONG_SWITCH_CORE_PATH:/api/v1/switch-core}
core.kong.payment-reservations-path=${CORE_KONG_PAYMENT_RESERVATIONS_PATH:/payment-reservations}
core.kong.auth-token=${CORE_KONG_AUTH_TOKEN:}
core.kong.client-token.enabled=${CORE_KONG_CLIENT_TOKEN_ENABLED:true}
core.kong.client-id=${CORE_KONG_CLIENT_ID:switch-pagos-internos-service}
core.kong.client-secret=${CORE_KONG_CLIENT_SECRET:}
core.kong.required-scope=${CORE_KONG_RESERVATION_CONSUME_REQUIRED_SCOPE:${CORE_KONG_REQUIRED_SCOPE:core.reserve.consume}}
core.kong.client-token-path=${CORE_KONG_CLIENT_TOKEN_PATH:/api/v1/auth/client-token}
core.kong.client-token-refresh-skew-seconds=${CORE_KONG_CLIENT_TOKEN_REFRESH_SKEW_SECONDS:60}
core.kong.connect-timeout-ms=${CORE_KONG_CONNECT_TIMEOUT_MS:5000}
core.kong.read-timeout-ms=${CORE_KONG_READ_TIMEOUT_MS:30000}
core.switch.default-accounting-date=${CORE_SWITCH_DEFAULT_ACCOUNTING_DATE:}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
